<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c43b3b"/>
      <stop offset="100%" stop-color="#8b2828"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="4"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- maskable safe zone is inside 80% of canvas; bg fills 100% so it works as maskable too -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  <text x="256" y="368" font-family="'Noto Serif TC','PingFang TC','Heiti TC',serif" font-size="320" font-weight="900" text-anchor="middle" fill="#f4e8d8" filter="url(#shadow)">識</text>
</svg>
